<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Sauze 3D</title>

  <!-- MapLibre v2 (più compatibile) -->
  <link href="https://unpkg.com/maplibre-gl@2.4.0/dist/maplibre-gl.css" rel="stylesheet"/>

  <style>
    html,body{margin:0;height:100%}
    #map{height:100%; background:#0b1220;}
    .panel{
      position:absolute; left:12px; top:12px; z-index:10;
      background:rgba(255,255,255,0.95);
      padding:12px; border-radius:14px;
      box-shadow:0 8px 20px rgba(0,0,0,0.2);
      font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial;
      width:360px; max-width: calc(100% - 24px);
    }
    .row{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}
    button{
      border:0;border-radius:10px;padding:8px 10px;
      font-weight:900;cursor:pointer;
    }
    .btn-dark{background:#111;color:#fff}
    .btn-light{background:#eee;color:#111}
    .small{font-size:12px;margin-top:8px;color:#333}
    input[type="range"]{width:100%}
    .msg{
      position:absolute; left:12px; right:12px; bottom:12px; z-index:20;
      background:rgba(0,0,0,0.78); color:#fff;
      padding:10px 12px; border-radius:14px;
      font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial;
      font-size:13px; line-height:1.3;
      white-space:pre-wrap;
    }
    .hint { opacity: 0.85; }
  </style>
</head>
<body>

<div id="map"></div>

<div class="panel">
  <div style="font-weight:1000;">🏔️ Sauze 3D</div>

  <div class="row">
    <button class="btn-dark" onclick="location.href='./'">↩︎ Torna 2D</button>
  </div>

  <div class="row">
    <button class="btn-light" id="btnMap">🗺️ Mappa</button>
    <button class="btn-dark" id="btnSat">🛰️ Satellite</button>
    <button class="btn-light" id="btnLabels">🔤 Labels: ON</button>
  </div>

  <div class="small">Esagerazione rilievo</div>
  <input id="ex" type="range" min="50" max="300" value="140">

  <div class="small hint">Tip: clicca una pista per info • 2 dita: inclina/ruota</div>
</div>

<div class="msg" id="msg">Avvio…</div>

<script src="https://unpkg.com/maplibre-gl@2.4.0/dist/maplibre-gl.js"></script>
<script>
  const MAPTILER_KEY = "PASTE_YOUR_MAPTILER_KEY_HERE"; // 👈 incolla la tua key qui
  const msg = document.getElementById("msg");
  const setMsg = (t)=> msg.textContent = t;

  // ---- WebGL check rapido ----
  function webglOk(){
    try{
      const c = document.createElement("canvas");
      const gl = c.getContext("webgl") || c.getContext("experimental-webgl");
      return !!gl;
    }catch(e){ return false; }
  }
  if(!webglOk()){
    setMsg("❌ WebGL non disponibile. Abilita accelerazione hardware o prova un altro browser.");
    throw new Error("WebGL not available");
  }

  // ---- Limite zoom: evita errori tile a zoom troppo alti ----
  // (MapTiler/CARTO spesso arrivano a 19-20, ma in free/alcune aree meglio tenere 18)
  const MAX_ZOOM_SAFE = 18;

  const CENTER = [6.86, 45.03];

  // ---- Style ----
  const style = {
    version: 8,
    sources: {
      // Basemap (CORS OK)
      carto: {
        type: "raster",
        tiles: ["https://basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}.png"],
        tileSize: 256,
        maxzoom: 19,
        attribution: "© OpenStreetMap contributors © CARTO"
      },

      // Satellite MapTiler
      sat: {
        type: "raster",
        tiles: [`https://api.maptiler.com/tiles/satellite/{z}/{x}/{y}.jpg?key=${MAPTILER_KEY}`],
        tileSize: 256,
        maxzoom: MAX_ZOOM_SAFE
      },

      // ✅ Labels/HYBRID MapTiler (endpoint più affidabile rispetto a tiles/hybrid su alcuni account)
      // Se sul tuo account hybrid non è abilitato, qui fallirà e lo vedrai dal banner.
      labels: {
        type: "raster",
        tiles: [`https://api.maptiler.com/maps/hybrid/{z}/{x}/{y}.png?key=${MAPTILER_KEY}`],
        tileSize: 256,
        maxzoom: MAX_ZOOM_SAFE
      },

      // DEM 3D
      terrainSource: {
        type: "raster-dem",
        tiles: ["https://s3.amazonaws.com/elevation-tiles-prod/terrarium/{z}/{x}/{y}.png"],
        tileSize: 256,
        encoding: "terrarium",
        maxzoom: 14
      }
    },
    layers: [
      // base mappa
      { id: "base", type: "raster", source: "carto", layout: { visibility: "visible" } },

      // satellite
      { id: "satellite", type: "raster", source: "sat", layout: { visibility: "none" } },

      // labels sopra (mettiamo sopra a tutto e leggermente trasparenti così si leggono bene)
      { id: "labels", type: "raster", source: "labels",
        layout: { visibility: "none" },
        paint: { "raster-opacity": 1.0 }
      }
    ]
  };

  const map = new maplibregl.Map({
    container: "map",
    style,
    center: CENTER,
    zoom: 12.2,
    pitch: 65,
    bearing: -20,
    antialias: true,
    maxZoom: MAX_ZOOM_SAFE
  });

  map.addControl(new maplibregl.NavigationControl({ visualizePitch: true }), "top-right");

  let labelsOn = true;

  function showMap(){
    map.setLayoutProperty("base", "visibility", "visible");
    map.setLayoutProperty("satellite", "visibility", "none");
    map.setLayoutProperty("labels", "visibility", "none");
    setMsg("✅ Modalità: Mappa 3D");
  }

  function showSatellite(){
    map.setLayoutProperty("base", "visibility", "none");
    map.setLayoutProperty("satellite", "visibility", "visible");
    map.setLayoutProperty("labels", "visibility", labelsOn ? "visible" : "none");
    setMsg("✅ Modalità: Satellite 3D" + (labelsOn ? " + Labels" : ""));
  }

  function toggleLabels(){
    labelsOn = !labelsOn;
    document.getElementById("btnLabels").textContent = "🔤 Labels: " + (labelsOn ? "ON" : "OFF");
    const satVisible = (map.getLayoutProperty("satellite", "visibility") !== "none");
    map.setLayoutProperty("labels", (labelsOn && satVisible) ? "visible" : "none");
    setMsg("✅ Labels: " + (labelsOn ? "ON" : "OFF"));
  }

  document.getElementById("btnMap").onclick = showMap;
  document.getElementById("btnSat").onclick = showSatellite;
  document.getElementById("btnLabels").onclick = toggleLabels;

  // ---- Popup piste ----
  let runPopup = null;
  function showRunPopup(lngLat, props){
    const name = props.name || props.ref || "Pista";
    const diff = props["piste:difficulty"] || "—";
    const type = props["piste:type"] || "—";
    const grooming = props["piste:grooming"] || "";
    const lit = props["piste:lit"] ? String(props["piste:lit"]) : "";
    const extra = [
      grooming ? `🛠 Grooming: <b>${grooming}</b>` : "",
      lit ? `💡 Illuminata: <b>${lit}</b>` : ""
    ].filter(Boolean).join("<br>");

    const html = `
      <div style="font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial;min-width:220px">
        🎿 <b>${name}</b><br>
        Difficoltà: <b>${diff}</b><br>
        Tipo: <b>${type}</b>
        ${extra ? `<hr style="border:none;border-top:1px solid #e6e6e6;margin:8px 0">${extra}` : ""}
      </div>
    `;

    if(runPopup) runPopup.remove();
    runPopup = new maplibregl.Popup({ closeButton:true, closeOnClick:true })
      .setLngLat(lngLat)
      .setHTML(html)
      .addTo(map);
  }

  map.on("load", () => {
    try{
      // Terrain ON
      map.setTerrain({ source: "terrainSource", exaggeration: 1.4 });

      // Piste GeoJSON
      map.addSource("runs", {
        type:"geojson",
        data:"./sauze_doulx.geojson"
      });

      // Outline
      map.addLayer({
        id: "runs-outline",
        type: "line",
        source: "runs",
        filter: ["==", ["get","piste:type"], "downhill"],
        paint: {
          "line-color": "#ffffff",
          "line-width": ["interpolate", ["linear"], ["zoom"], 10, 3.5, 12, 5.5, 14, 7.5, 16, 10.0],
          "line-opacity": 0.55
        }
      });

      // Piste colorate
      map.addLayer({
        id: "runs-colored",
        type: "line",
        source: "runs",
        filter: ["==", ["get","piste:type"], "downhill"],
        paint: {
          "line-color": [
            "case",
            ["in", ["downcase", ["to-string", ["get","piste:difficulty"]]], ["literal", ["easy","novice","beginner","blue"]]], "#1f77b4",
            ["in", ["downcase", ["to-string", ["get","piste:difficulty"]]], ["literal", ["intermediate","medium","red"]]], "#d62728",
            ["in", ["downcase", ["to-string", ["get","piste:difficulty"]]], ["literal", ["advanced","expert","difficult","black"]]], "#000000",
            "#7aa6d8"
          ],
          "line-width": ["interpolate", ["linear"], ["zoom"], 10, 2.5, 12, 4.0, 14, 6.0, 16, 8.0],
          "line-opacity": 0.95
        }
      });

      // ✅ Click sulle piste -> popup
      map.on("mouseenter", "runs-colored", () => map.getCanvas().style.cursor = "pointer");
      map.on("mouseleave", "runs-colored", () => map.getCanvas().style.cursor = "");
      map.on("click", "runs-colored", (e) => {
        const f = e.features && e.features[0];
        if(!f) return;
        showRunPopup(e.lngLat, f.properties || {});
      });

      setMsg("✅ 3D pronto. Premi “Satellite” e poi “Labels ON” per vedere i nomi.");
    }catch(e){
      console.error(e);
      setMsg("⚠️ Mappa OK, ma errore nel caricare piste/terrain:\n" + (e?.message || e));
    }
  });

  // Slider esagerazione
  document.getElementById("ex").addEventListener("input", (e)=>{
    const ex = Number(e.target.value) / 100;
    try{ map.setTerrain({ source: "terrainSource", exaggeration: ex }); }catch(err){}
  });

  // ---- Gestione errori: non “sporcare” l’app con errori tile (404/failed to fetch) ----
  // Se una tile singola fallisce (zoom alto / provider / rete), non vogliamo banner rosso.
  let lastHardErrorAt = 0;
  function shouldIgnoreErrorMessage(m){
    const s = String(m || "").toLowerCase();
    // errori tipici tile non fatali
    if (s.includes("failed to fetch")) return true;
    if (s.includes("status 404")) return true;
    if (s.includes("404")) return true;
    if (s.includes("tile")) return true;
    return false;
  }

  map.on("error", (e) => {
    const em = (e && e.error && e.error.message) ? e.error.message : (e?.message || "");
    console.error("Map error:", e?.error || e);

    // ignora errori di tile “non fatali”
    if (shouldIgnoreErrorMessage(em)) {
      // non mostriamo niente: la mappa può continuare a funzionare
      return;
    }

    // Evita spam: mostra al massimo ogni 3 sec
    const now = Date.now();
    if (now - lastHardErrorAt < 3000) return;
    lastHardErrorAt = now;

    setMsg("❌ Errore mappa:\n" + em + "\n\nSe succede attivando Labels: controlla che HYBRID sia incluso nel tuo piano/key MapTiler.");
  });
</script>
</body>
</html>
