<!doctype html>
<html lang="it">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Sauze 3D</title>

<link href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" rel="stylesheet"/>
<style>
html,body{margin:0;height:100%}
#map{height:100%}
.panel{
  position:absolute; left:12px; top:12px; z-index:10;
  background:rgba(255,255,255,0.95);
  padding:12px; border-radius:14px;
  box-shadow:0 8px 20px rgba(0,0,0,0.2);
  font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial;
  width:300px;
}
button{border:0;border-radius:10px;padding:8px 10px;font-weight:900;cursor:pointer;background:#111;color:#fff}
</style>
</head>
<body>

<div id="map"></div>

<div class="panel">
  <div style="font-weight:900;">🏔️ Sauze 3D</div>
  <div style="margin-top:8px;">
    <button onclick="location.href='./'">↩︎ Torna 2D</button>
  </div>
</div>

<script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
<script>

if (!maplibregl.supported()) {
  alert("WebGL non supportato su questo browser");
}

// Centro Sauze
const map = new maplibregl.Map({
  container: "map",
  style: {
    version: 8,
    sources: {
      satellite: {
        type: "raster",
        tiles: [
          "https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}"
        ],
        tileSize: 256
      },
      terrainSource: {
        type: "raster-dem",
        tiles: [
          "https://s3.amazonaws.com/elevation-tiles-prod/terrarium/{z}/{x}/{y}.png"
        ],
        tileSize: 256,
        encoding: "terrarium",
        maxzoom: 14
      }
    },
    layers: [
      {
        id: "satellite",
        type: "raster",
        source: "satellite"
      }
    ]
  },
  center: [6.86, 45.03],
  zoom: 12.2,
  pitch: 65,
  bearing: -20,
  antialias: true
});

map.on("load", () => {

  // Attiva terreno
  map.setTerrain({
    source: "terrainSource",
    exaggeration: 1.5
  });

  // Ora aggiungiamo le piste DOPO
  map.addSource("runs", {
    type: "geojson",
    data: "./sauze_doulx.geojson"
  });

  map.addLayer({
    id: "runs",
    type: "line",
    source: "runs",
    filter: ["==", ["get","piste:type"], "downhill"],
    paint: {
      "line-color": [
        "case",
        ["in", ["downcase", ["to-string", ["get","piste:difficulty"]]], ["literal", ["easy","novice","beginner","blue"]]], "#1f77b4",
        ["in", ["downcase", ["to-string", ["get","piste:difficulty"]]], ["literal", ["intermediate","medium","red"]]], "#d62728",
        ["in", ["downcase", ["to-string", ["get","piste:difficulty"]]], ["literal", ["advanced","expert","difficult","black"]]], "#000000",
        "#7aa6d8"
      ],
      "line-width": 4
    }
  });

});

map.addControl(new maplibregl.NavigationControl(), "top-right");

</script>
</body>
</html>
