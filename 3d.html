<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Sauze 3D</title>

  <link href="https://unpkg.com/maplibre-gl@2.4.0/dist/maplibre-gl.css" rel="stylesheet"/>

  <style>
    html, body { margin:0; height:100% }
    #map { height:100%; background:#0b1220; }

    .panel{
      position:absolute; left:12px; top:12px; z-index:10;
      background:rgba(255,255,255,0.95);
      padding:12px; border-radius:14px;
      box-shadow:0 8px 20px rgba(0,0,0,0.2);
      font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial;
      width:340px; max-width: calc(100% - 24px);
    }
    .row{ display:flex; gap:8px; flex-wrap:wrap; margin-top:8px }
    button{
      border:0; border-radius:10px; padding:8px 10px;
      font-weight:900; cursor:pointer;
    }
    .btn-dark{ background:#111; color:#fff }
    .btn-light{ background:#eee; color:#111 }
    .small{ font-size:12px; margin-top:8px; color:#333 }
    input[type="range"]{ width:100% }

    .msg{
      position:absolute; left:12px; right:12px; bottom:12px; z-index:20;
      background:rgba(0,0,0,0.78); color:#fff;
      padding:10px 12px; border-radius:14px;
      font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial;
      font-size:13px; line-height:1.3;
      white-space:pre-wrap;
    }

    /* ✅ Pannello quota (sotto al pannello principale) */
    .elev{
      position:absolute;
      left:12px;
      top: 260px;              /* se vuoi: regola a piacere */
      z-index:15;
      background:rgba(255,255,255,0.95);
      padding:10px 12px;
      border-radius:14px;
      box-shadow:0 8px 20px rgba(0,0,0,0.18);
      font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial;
      font-weight:900;
      width:340px; max-width: calc(100% - 24px);
    }
    .elev small{
      display:block;
      font-weight:700;
      opacity:0.7;
      margin-top:4px;
    }
  </style>
</head>

<body>

<div id="map"></div>

<div class="panel">
  <div style="font-weight:1000;">🏔️ Sauze 3D</div>

  <div class="row">
    <button class="btn-dark" onclick="location.href='./'">↩︎ Torna 2D</button>
  </div>

  <div class="row">
    <button class="btn-light" id="btnMap">🗺️ Mappa</button>
    <button class="btn-dark" id="btnSat">🛰️ Satellite</button>
    <button class="btn-light" id="btnLabels">🔤 Labels: OFF</button>
  </div>

  <!-- ✅ Toggle Rifugi / Impianti -->
  <div class="row">
    <button class="btn-dark" id="btnRifugi">🍽 Rifugi: ON</button>
    <button class="btn-dark" id="btnImpianti">🚡 Impianti: ON</button>
  </div>

  <div class="small">Esagerazione rilievo</div>
  <input id="ex" type="range" min="50" max="300" value="140">

  <div class="small">2 dita: inclina/ruota • Pinch: zoom</div>
</div>

<!-- ✅ Pannello quota -->
<div class="elev" id="elevPanel">
  Quota: --
  <small id="elevHint">Muovi il mouse sulla mappa</small>
</div>

<div class="msg" id="msg">Avvio…</div>

<script src="https://unpkg.com/maplibre-gl@2.4.0/dist/maplibre-gl.js"></script>
<script>
const MAPTILER_KEY = "ORUgXv14fwE911CA6MdX";

const msg = document.getElementById("msg");
const setMsg = (t) => msg.textContent = t;

const CENTER = [6.86, 45.03];

// ✅ util quota
function fmtMeters(v){
  if (v === null || v === undefined || Number.isNaN(v)) return "--";
  return `${Math.round(v)} m`;
}

function runNameFromProps(p){
  return p?.name || p?.["piste:name"] || p?.ref ||
         p?.["piste:ref"] || p?.["piste:ref:name"] || "Pista";
}
function runDifficultyFromProps(p){
  return p?.["piste:difficulty"] || p?.difficulty || "";
}
function runColorFromDifficulty(diffRaw){
  const d = String(diffRaw || "").toLowerCase();
  if (["easy","novice","beginner","blue"].includes(d)) return "#1f77b4";
  if (["intermediate","medium","red"].includes(d)) return "#d62728";
  if (["advanced","expert","difficult","black"].includes(d)) return "#000000";
  return "#7aa6d8";
}

const popup = new maplibregl.Popup({
  closeButton: true,
  closeOnClick: true,
  maxWidth: "280px"
});

const style = {
  version: 8,
  sources: {
    carto: {
      type: "raster",
      tiles: ["https://basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}.png"],
      tileSize: 256
    },
    sat: {
      type: "raster",
      tiles: [`https://api.maptiler.com/tiles/satellite-v2/{z}/{x}/{y}.jpg?key=${MAPTILER_KEY}`],
      tileSize: 256
    },
    labels: {
      type: "raster",
      tiles: [`https://api.maptiler.com/tiles/hybrid/{z}/{x}/{y}.png?key=${MAPTILER_KEY}`],
      tileSize: 256
    },
    terrainSource: {
      type: "raster-dem",
      tiles: ["https://s3.amazonaws.com/elevation-tiles-prod/terrarium/{z}/{x}/{y}.png"],
      tileSize: 256,
      encoding: "terrarium",
      maxzoom: 14
    }
  },
  layers: [
    { id:"base", type:"raster", source:"carto", layout:{ visibility:"visible" }},
    { id:"satellite", type:"raster", source:"sat", layout:{ visibility:"none" }},
    { id:"labels", type:"raster", source:"labels", layout:{ visibility:"none" }}
  ]
};

const map = new maplibregl.Map({
  container:"map",
  style,
  center:CENTER,
  zoom:12.2,
  pitch:65,
  bearing:-20,
  antialias:true
});

map.addControl(new maplibregl.NavigationControl({ visualizePitch:true }), "top-right");

// Google links
function googleMapsPlaceUrl(name, lat, lng) {
  const q = encodeURIComponent(`${name}, ${lat},${lng}`);
  return `https://www.google.com/maps/search/?api=1&query=${q}`;
}
function googleMapsDirectionsUrl(lat, lng) {
  return `https://www.google.com/maps/dir/?api=1&destination=${lat},${lng}`;
}

// -------------------------
// ICONS: CANVAS -> IMAGEDATA -> addImage({width,height,data})
// -------------------------
function addIconFromCanvas(name, drawFn, size=64, pixelRatio=2) {
  if (map.hasImage(name)) return;

  const c = document.createElement("canvas");
  c.width = size;
  c.height = size;
  const ctx = c.getContext("2d");
  drawFn(ctx, size);

  const img = ctx.getImageData(0, 0, size, size);
  const data = new Uint8Array(img.data.buffer);
  map.addImage(name, { width: size, height: size, data }, { pixelRatio });
}

function addAllIcons() {
  addIconFromCanvas("icon-ristoro", (ctx, s) => {
    ctx.beginPath();
    ctx.arc(s/2, s/2, s*0.34, 0, Math.PI*2);
    ctx.fillStyle = "#ffcc00";
    ctx.fill();
    ctx.lineWidth = 4;
    ctx.strokeStyle = "#111";
    ctx.stroke();

    ctx.strokeStyle = "#111";
    ctx.lineWidth = 4;
    ctx.lineCap = "round";
    ctx.lineJoin = "round";

    const x = s*0.34, y1 = s*0.28, y2 = s*0.56;

    ctx.beginPath();
    ctx.moveTo(x, y1); ctx.lineTo(x, y2);
    ctx.stroke();

    ctx.beginPath();
    ctx.moveTo(x - s*0.06, y1); ctx.lineTo(x - s*0.06, y1 + s*0.16);
    ctx.moveTo(x,           y1); ctx.lineTo(x,           y1 + s*0.16);
    ctx.moveTo(x + s*0.06, y1); ctx.lineTo(x + s*0.06, y1 + s*0.16);
    ctx.stroke();

    ctx.beginPath();
    ctx.moveTo(x - s*0.06, y1 + s*0.16);
    ctx.lineTo(x + s*0.06, y1 + s*0.16);
    ctx.stroke();

    ctx.beginPath();
    ctx.moveTo(x, y2); ctx.lineTo(x, s*0.74);
    ctx.stroke();

    const kx = s*0.62;
    ctx.beginPath();
    ctx.moveTo(kx, y1);
    ctx.quadraticCurveTo(kx + s*0.08, y1 + s*0.10, kx, y1 + s*0.26);
    ctx.lineTo(kx, s*0.74);
    ctx.stroke();

    ctx.beginPath();
    ctx.moveTo(kx, y1);
    ctx.lineTo(kx + s*0.09, y1 + s*0.09);
    ctx.stroke();
  });

  addIconFromCanvas("icon-impianto", (ctx, s) => {
    ctx.beginPath();
    ctx.arc(s/2, s/2, s*0.34, 0, Math.PI*2);
    ctx.fillStyle = "#7dd3fc";
    ctx.fill();
    ctx.lineWidth = 4;
    ctx.strokeStyle = "#111";
    ctx.stroke();

    ctx.strokeStyle = "#111";
    ctx.lineWidth = 4;
    ctx.lineCap = "round";
    ctx.lineJoin = "round";

    ctx.beginPath();
    ctx.moveTo(s*0.26, s*0.34);
    ctx.lineTo(s*0.74, s*0.34);
    ctx.stroke();

    ctx.beginPath();
    ctx.moveTo(s*0.50, s*0.34);
    ctx.lineTo(s*0.50, s*0.49);
    ctx.stroke();

    ctx.beginPath();
    ctx.moveTo(s*0.40, s*0.49);
    ctx.lineTo(s*0.60, s*0.49);
    ctx.stroke();

    ctx.beginPath();
    ctx.moveTo(s*0.40, s*0.52);
    ctx.lineTo(s*0.40, s*0.68);
    ctx.moveTo(s*0.60, s*0.52);
    ctx.lineTo(s*0.60, s*0.68);
    ctx.stroke();

    ctx.beginPath();
    ctx.moveTo(s*0.36, s*0.68);
    ctx.lineTo(s*0.64, s*0.68);
    ctx.stroke();

    ctx.beginPath();
    ctx.moveTo(s*0.40, s*0.60);
    ctx.lineTo(s*0.60, s*0.60);
    ctx.stroke();
  });
}

// helper visibilità layer
function setLayerVisible(id, visible) {
  if (!map.getLayer(id)) return;
  map.setLayoutProperty(id, "visibility", visible ? "visible" : "none");
}

map.on("load", () => {
  try {
    // ✅ terrain ON (già ok)
    map.setTerrain({ source:"terrainSource", exaggeration:1.4 });

    const ex = document.getElementById("ex");
    ex.addEventListener("input", () => {
      map.setTerrain({ source: "terrainSource", exaggeration: parseInt(ex.value)/100 });
    });

    // ✅ QUOTA: pannello hover/center + hint
    const elevPanel = document.getElementById("elevPanel");
    const elevHint  = document.getElementById("elevHint");
    const isTouch = ('ontouchstart' in window) || (navigator.maxTouchPoints > 0);

    if (isTouch) {
      elevHint.textContent = "Su mobile: quota al centro mappa";
      const updateCenterElev = () => {
        const c = map.getCenter();
        const elev = map.queryTerrainElevation(c);
        elevPanel.firstChild.textContent = `Quota: ${fmtMeters(elev)}`;
      };
      map.on("move", () => updateCenterElev());
      map.once("idle", () => updateCenterElev());
    } else {
      elevHint.textContent = "Desktop: quota sotto il mouse";
      let lastElevUpdate = 0;
      map.on("mousemove", (e) => {
        const now = performance.now();
        if (now - lastElevUpdate < 80) return; // throttle
        lastElevUpdate = now;
        const elev = map.queryTerrainElevation(e.lngLat);
        elevPanel.firstChild.textContent = `Quota: ${fmtMeters(elev)}`;
      });
    }

    // PISTE
    map.addSource("runs", { type:"geojson", data:"./sauze_doulx.geojson" });

    map.addLayer({
      id:"runs-outline",
      type:"line",
      source:"runs",
      filter:["==",["get","piste:type"],"downhill"],
      paint:{
        "line-color":"#ffffff",
        "line-width":["interpolate",["linear"],["zoom"],10,3.5,12,5.5,14,7.5,16,10],
        "line-opacity":0.55
      }
    });

    map.addLayer({
      id:"runs-colored",
      type:"line",
      source:"runs",
      filter:["==",["get","piste:type"],"downhill"],
      paint:{
        "line-color":[
          "case",
          ["in",["downcase",["to-string",["get","piste:difficulty"]]],["literal",["easy","novice","beginner","blue"]]],"#1f77b4",
          ["in",["downcase",["to-string",["get","piste:difficulty"]]],["literal",["intermediate","medium","red"]]],"#d62728",
          ["in",["downcase",["to-string",["get","piste:difficulty"]]],["literal",["advanced","expert","difficult","black"]]],"#000000",
          "#7aa6d8"
        ],
        "line-width":["interpolate",["linear"],["zoom"],10,2.5,12,4,14,6,16,8],
        "line-opacity":0.95
      }
    });

    map.addLayer({
      id:"runs-selected",
      type:"line",
      source:"runs",
      filter:["==",["id"],"__none__"],
      paint:{
        "line-color":"#ffff00",
        "line-width":["interpolate",["linear"],["zoom"],10,5,12,7,14,9,16,12]
      }
    });

    map.on("click", "runs-colored", (e) => {
      const f = e.features && e.features[0];
      if (!f) return;
      const p = f.properties || {};

      const name = runNameFromProps(p);
      const diff = runDifficultyFromProps(p);
      const color = runColorFromDifficulty(diff);

      // ✅ quota al punto click (per pista)
      const elev = map.queryTerrainElevation(e.lngLat);

      if (f.id !== undefined && f.id !== null) {
        map.setFilter("runs-selected", ["==", ["id"], f.id]);
      } else {
        map.setFilter("runs-selected", ["==", ["id"], "__none__"]);
      }

      popup
        .setLngLat(e.lngLat)
        .setHTML(`
          <div style="font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial">
            <div style="font-weight:900">${name}</div>
            <div style="margin-top:4px">
              Difficoltà:
              <span style="color:${color};font-weight:800">${diff || "N/D"}</span>
            </div>
            <div style="margin-top:6px;font-weight:900">Quota: ${fmtMeters(elev)}</div>
          </div>
        `)
        .addTo(map);
    });

    map.on("mouseenter", "runs-colored", () => { map.getCanvas().style.cursor = "pointer"; });
    map.on("mouseleave", "runs-colored", () => { map.getCanvas().style.cursor = ""; });

    // ICONS
    addAllIcons();

    // RIFUGI
    map.addSource("rifugi", { type:"geojson", data:"./data/rifugi.geojson" });

    map.addLayer({
      id:"rifugi-layer",
      type:"symbol",
      source:"rifugi",
      filter:["==",["geometry-type"],"Point"],
      layout:{
        "icon-image":"icon-ristoro",
        "icon-size":0.6,
        "icon-allow-overlap":true,
        "visibility":"visible"
      }
    });

    map.addLayer({
      id:"rifugi-label",
      type:"symbol",
      source:"rifugi",
      filter:["==",["geometry-type"],"Point"],
      layout:{
        "text-field":["get","name"],
        "text-size":13,
        "text-offset":[0,1.35],
        "text-anchor":"top",
        "text-allow-overlap":true,
        "visibility":"visible"
      },
      paint:{ "text-halo-color":"#fff", "text-halo-width":2 }
    });

    // IMPIANTI
    map.addSource("impianti", { type:"geojson", data:"./data/impianti.geojson" });

    map.addLayer({
      id:"impianti-layer",
      type:"symbol",
      source:"impianti",
      filter:["==",["geometry-type"],"Point"],
      layout:{
        "icon-image":"icon-impianto",
        "icon-size":0.6,
        "icon-allow-overlap":true,
        "visibility":"visible"
      }
    });

    map.addLayer({
      id:"impianti-label",
      type:"symbol",
      source:"impianti",
      filter:["==",["geometry-type"],"Point"],
      layout:{
        "text-field":["coalesce",["get","name"],["get","ref"],"Impianto"],
        "text-size":13,
        "text-offset":[0,1.35],
        "text-anchor":"top",
        "text-allow-overlap":true,
        "visibility":"visible"
      },
      paint:{ "text-halo-color":"#fff", "text-halo-width":2 }
    });

    // sopra le piste
    map.moveLayer("rifugi-layer"); map.moveLayer("rifugi-label");
    map.moveLayer("impianti-layer"); map.moveLayer("impianti-label");

    // popup rifugi
    map.on("mouseenter","rifugi-layer",()=>map.getCanvas().style.cursor="pointer");
    map.on("mouseleave","rifugi-layer",()=>map.getCanvas().style.cursor="");
    map.on("click","rifugi-layer",(e)=>{
      const f=e.features&&e.features[0]; if(!f) return;
      const name=f.properties?.name||"Rifugio";
      const [lng,lat]=f.geometry.coordinates;

      // ✅ quota (usa click per precisione)
      const elev = map.queryTerrainElevation(e.lngLat);

      const googleUrl=googleMapsPlaceUrl(name,lat,lng);
      const navUrl=googleMapsDirectionsUrl(lat,lng);
      new maplibregl.Popup()
        .setLngLat(e.lngLat)
        .setHTML(`
          <div style="font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial">
            <div style="font-weight:900;font-size:14px;margin-bottom:6px;">🍽️ ${name}</div>
            <div style="font-weight:900;margin-bottom:10px;">Quota: ${fmtMeters(elev)}</div>
            <div style="display:flex;gap:8px;flex-wrap:wrap">
              <a href="${googleUrl}" target="_blank" rel="noopener noreferrer"
                 style="display:inline-block;padding:8px 10px;border-radius:10px;background:#111;color:#fff;text-decoration:none;font-weight:900;">
                Apri su Google
              </a>
              <a href="${navUrl}" target="_blank" rel="noopener noreferrer"
                 style="display:inline-block;padding:8px 10px;border-radius:10px;background:#eee;color:#111;text-decoration:none;font-weight:900;">
                Naviga
              </a>
            </div>
          </div>
        `).addTo(map);
    });

    // popup impianti
    map.on("mouseenter","impianti-layer",()=>map.getCanvas().style.cursor="pointer");
    map.on("mouseleave","impianti-layer",()=>map.getCanvas().style.cursor="");
    map.on("click","impianti-layer",(e)=>{
      const f=e.features&&e.features[0]; if(!f) return;
      const name=f.properties?.name||f.properties?.ref||"Impianto";
      const [lng,lat]=f.geometry.coordinates;

      // ✅ quota
      const elev = map.queryTerrainElevation(e.lngLat);

      const googleUrl=googleMapsPlaceUrl(name,lat,lng);
      const navUrl=googleMapsDirectionsUrl(lat,lng);
      new maplibregl.Popup()
        .setLngLat(e.lngLat)
        .setHTML(`
          <div style="font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial">
            <div style="font-weight:900;font-size:14px;margin-bottom:6px;">🚡 ${name}</div>
            <div style="font-weight:900;margin-bottom:10px;">Quota: ${fmtMeters(elev)}</div>
            <div style="display:flex;gap:8px;flex-wrap:wrap">
              <a href="${googleUrl}" target="_blank" rel="noopener noreferrer"
                 style="display:inline-block;padding:8px 10px;border-radius:10px;background:#111;color:#fff;text-decoration:none;font-weight:900;">
                Apri su Google
              </a>
              <a href="${navUrl}" target="_blank" rel="noopener noreferrer"
                 style="display:inline-block;padding:8px 10px;border-radius:10px;background:#eee;color:#111;text-decoration:none;font-weight:900;">
                Naviga
              </a>
            </div>
          </div>
        `).addTo(map);
    });

    // ✅ click "vuoto": popup quota (evita doppioni)
    map.on("click", (e) => {
      const hits = map.queryRenderedFeatures(e.point, {
        layers: ["runs-colored", "rifugi-layer", "impianti-layer"]
      });
      if (hits && hits.length) return;

      const elev = map.queryTerrainElevation(e.lngLat);
      new maplibregl.Popup()
        .setLngLat(e.lngLat)
        .setHTML(`
          <div style="font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial">
            <div style="font-weight:900">Quota</div>
            <div style="margin-top:6px;font-weight:900;font-size:16px">${fmtMeters(elev)}</div>
          </div>
        `)
        .addTo(map);
    });

    // -------------------------
    // BOTTONI BASEMAP / LABELS
    // -------------------------
    const btnMap=document.getElementById("btnMap");
    const btnSat=document.getElementById("btnSat");
    const btnLabels=document.getElementById("btnLabels");
    let labelsOn=false;

    btnMap.onclick=()=>{
      map.setLayoutProperty("base","visibility","visible");
      map.setLayoutProperty("satellite","visibility","none");
      map.setLayoutProperty("labels","visibility","none");
      labelsOn=false;
      btnLabels.textContent="🔤 Labels: OFF";
      setMsg("✅ Modalità: Mappa");
    };
    btnSat.onclick=()=>{
      map.setLayoutProperty("base","visibility","none");
      map.setLayoutProperty("satellite","visibility","visible");
      map.setLayoutProperty("labels","visibility",labelsOn?"visible":"none");
      setMsg("✅ Modalità: Satellite");
    };
    btnLabels.onclick=()=>{
      labelsOn=!labelsOn;
      map.setLayoutProperty("labels","visibility",labelsOn?"visible":"none");
      btnLabels.textContent="🔤 Labels: "+(labelsOn?"ON":"OFF");
    };

    // -------------------------
    // ✅ TOGGLE RIFUGI / IMPIANTI
    // -------------------------
    const btnRifugi = document.getElementById("btnRifugi");
    const btnImpianti = document.getElementById("btnImpianti");

    let rifugiOn = true;
    let impiantiOn = true;

    btnRifugi.onclick = () => {
      rifugiOn = !rifugiOn;
      setLayerVisible("rifugi-layer", rifugiOn);
      setLayerVisible("rifugi-label", rifugiOn);
      btnRifugi.textContent = "🍽 Rifugi: " + (rifugiOn ? "ON" : "OFF");
    };

    btnImpianti.onclick = () => {
      impiantiOn = !impiantiOn;
      setLayerVisible("impianti-layer", impiantiOn);
      setLayerVisible("impianti-label", impiantiOn);
      btnImpianti.textContent = "🚡 Impianti: " + (impiantiOn ? "ON" : "OFF");
    };

    setMsg("✅ 3D pronto. Piste + Rifugi + Impianti + Quota");

  } catch(e){
    console.error(e);
    setMsg("⚠️ Errore:\n" + (e?.message || e));
  }
});
</script>

</body>
</html>
