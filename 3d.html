<!doctype html>
<html lang="it">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Sauze 3D</title>

<link href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" rel="stylesheet"/>
<style>
html,body{margin:0;height:100%}
#map{height:100%}
.panel{
  position:absolute; left:12px; top:12px; z-index:10;
  background:rgba(255,255,255,0.95); padding:12px; border-radius:14px;
  box-shadow:0 8px 20px rgba(0,0,0,0.2);
  font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial;
  width:320px; max-width: calc(100% - 24px);
}
.row{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}
button{border:0;border-radius:10px;padding:8px 10px;font-weight:900;cursor:pointer}
.btn-dark{background:#111;color:#fff}
.small{font-size:12px;margin-top:8px;color:#333}
input[type="range"]{width:100%}
.msg{
  position:absolute; left:12px; right:12px; bottom:12px; z-index:20;
  background:rgba(0,0,0,0.75); color:#fff; padding:10px 12px;
  border-radius:14px; font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial;
  font-size:13px; line-height:1.3;
}
</style>
</head>
<body>

<div id="map"></div>

<div class="panel">
  <div style="font-weight:1000;">🏔️ Sauze 3D</div>
  <div class="row">
    <button class="btn-dark" onclick="location.href='./'">↩︎ Torna 2D</button>
  </div>
  <div class="small">Esagerazione rilievo</div>
  <input id="ex" type="range" min="50" max="300" value="140">
  <div class="small">2 dita: inclina/ruota • Pinch: zoom</div>
</div>

<div class="msg" id="msg">Caricamento 3D…</div>

<script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
<script>
const msg = document.getElementById("msg");
function setMsg(t){ msg.textContent = t; }

// ✅ Check WebGL
if (!maplibregl.supported()) {
  setMsg("⚠️ WebGL non supportato su questo browser/dispositivo. Apri in Safari (non in-app browser) o aggiorna iOS.");
  throw new Error("WebGL not supported");
}

const CENTER = [6.86, 45.03];

const map = new maplibregl.Map({
  container: "map",
  style: {
    version: 8,
    sources: {
      satellite: {
        type: "raster",
        tiles: [
          "https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}"
        ],
        tileSize: 256,
        attribution: "Tiles © Esri"
      },
      terrainSource: {
        type: "raster-dem",
        tiles: [
          "https://s3.amazonaws.com/elevation-tiles-prod/terrarium/{z}/{x}/{y}.png"
        ],
        tileSize: 256,
        encoding: "terrarium",
        maxzoom: 14
      },
      runs: {
        type: "geojson",
        data: "./sauze_doulx.geojson"
      }
    },
    layers: [
      { id: "satellite", type: "raster", source: "satellite" },

      // outline sotto per leggibilità
      {
        id: "runs-outline",
        type: "line",
        source: "runs",
        filter: ["==", ["get","piste:type"], "downhill"],
        paint: {
          "line-color": "#ffffff",
          "line-width": ["interpolate", ["linear"], ["zoom"], 10, 3.5, 12, 5.5, 14, 7.5, 16, 10.0],
          "line-opacity": 0.55
        }
      },
      // piste colorate
      {
        id: "runs-colored",
        type: "line",
        source: "runs",
        filter: ["==", ["get","piste:type"], "downhill"],
        paint: {
          "line-color": [
            "case",
            ["in", ["downcase", ["to-string", ["get","piste:difficulty"]]], ["literal", ["easy","novice","beginner","blue"]]], "#1f77b4",
            ["in", ["downcase", ["to-string", ["get","piste:difficulty"]]], ["literal", ["intermediate","medium","red"]]], "#d62728",
            ["in", ["downcase", ["to-string", ["get","piste:difficulty"]]], ["literal", ["advanced","expert","difficult","black"]]], "#000000",
            "#7aa6d8"
          ],
          "line-width": ["interpolate", ["linear"], ["zoom"], 10, 2.5, 12, 4.0, 14, 6.0, 16, 8.0],
          "line-opacity": 0.95
        }
      }
    ]
  },
  center: CENTER,
  zoom: 12.2,
  pitch: 60,
  bearing: -20,
  antialias: true
});

map.addControl(new maplibregl.NavigationControl({ visualizePitch: true }), "top-right");
map.addControl(new maplibregl.GeolocateControl({
  positionOptions: { enableHighAccuracy: true },
  trackUserLocation: true
}), "top-right");

map.on("load", () => {
  // ✅ Attiva terreno 3D
  map.setTerrain({ source: "terrainSource", exaggeration: 1.4 });
  setMsg("✅ 3D attivo. Prova a inclinare (2 dita) — Se è piatto, potrebbe essere il DEM non caricato.");
});

map.on("error", (e) => {
  console.error("Map error", e?.error || e);
  setMsg("⚠️ Errore mappa/terrain. Apri e ricarica in Safari. Se persiste, dimmi cosa vedi qui e lo sistemiamo.");
});

// slider esagerazione
document.getElementById("ex").addEventListener("input", (e)=>{
  const ex = Number(e.target.value) / 100;
  map.setTerrain({ source: "terrainSource", exaggeration: ex });
});
</script>
</body>
</html>
