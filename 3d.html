<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Sauze 3D</title>

  <link href="https://unpkg.com/maplibre-gl@2.4.0/dist/maplibre-gl.css" rel="stylesheet"/>

  <style>
    html,body{margin:0;height:100%}
    #map{height:100%; background:#0b1220;}
    .panel{
      position:absolute; left:12px; top:12px; z-index:10;
      background:rgba(255,255,255,0.95);
      padding:12px; border-radius:14px;
      box-shadow:0 8px 20px rgba(0,0,0,0.2);
      font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial;
      width:340px; max-width: calc(100% - 24px);
    }
    .row{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}
    button{
      border:0;border-radius:10px;padding:8px 10px;
      font-weight:900;cursor:pointer;
    }
    .btn-dark{background:#111;color:#fff}
    .btn-light{background:#eee;color:#111}
    .small{font-size:12px;margin-top:8px;color:#333}
    input[type="range"]{width:100%}
    .msg{
      position:absolute; left:12px; right:12px; bottom:12px; z-index:20;
      background:rgba(0,0,0,0.78); color:#fff;
      padding:10px 12px; border-radius:14px;
      font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial;
      font-size:13px; line-height:1.3;
      white-space:pre-wrap;
    }
  </style>
</head>
<body>

<div id="map"></div>

<div class="panel">
  <div style="font-weight:1000;">🏔️ Sauze 3D</div>

  <div class="row">
    <button class="btn-dark" onclick="location.href='./'">↩︎ Torna 2D</button>
  </div>

  <div class="row">
    <button class="btn-light" id="btnMap">🗺️ Mappa</button>
    <button class="btn-dark" id="btnSat">🛰️ Satellite</button>
    <button class="btn-light" id="btnLabels">🔤 Labels: ON</button>
  </div>

  <div class="small">Esagerazione rilievo</div>
  <input id="ex" type="range" min="50" max="300" value="140">

  <div class="small">2 dita: inclina/ruota • Pinch: zoom</div>
</div>

<div class="msg" id="msg">Avvio…</div>

<script src="https://unpkg.com/maplibre-gl@2.4.0/dist/maplibre-gl.js"></script>
<script>
  const MAPTILER_KEY = "ujmVsM1FLEYnTiV9yrPe";
  const msg = document.getElementById("msg");
  const setMsg = (t)=> msg.textContent = t;

  const CENTER = [6.86, 45.03];

  const style = {
    version: 8,
    sources: {
      carto: {
        type: "raster",
        tiles: ["https://basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}.png"],
        tileSize: 256
      },
      sat: {
        type: "raster",
        tiles: [`https://api.maptiler.com/tiles/satellite/{z}/{x}/{y}.jpg?key=${MAPTILER_KEY}`],
        tileSize: 256
      },
      labels: {
        type: "raster",
        tiles: [`https://api.maptiler.com/tiles/hybrid/{z}/{x}/{y}.png?key=${MAPTILER_KEY}`],
        tileSize: 256
      },
      terrainSource: {
        type: "raster-dem",
        tiles: ["https://s3.amazonaws.com/elevation-tiles-prod/terrarium/{z}/{x}/{y}.png"],
        tileSize: 256,
        encoding: "terrarium",
        maxzoom: 14
      }
    },
    layers: [
      { id: "base", type: "raster", source: "carto" },
      { id: "satellite", type: "raster", source: "sat", layout: { visibility: "none" } },
      { id: "labels", type: "raster", source: "labels", layout: { visibility: "visible" } }
    ]
  };

  const map = new maplibregl.Map({
    container: "map",
    style,
    center: CENTER,
    zoom: 12.2,
    pitch: 65,
    bearing: -20,
    antialias: true
  });

  map.addControl(new maplibregl.NavigationControl({ visualizePitch: true }), "top-right");

  map.on("load", () => {

    map.setTerrain({ source: "terrainSource", exaggeration: 1.4 });

    map.addSource("runs", { type:"geojson", data:"./sauze_doulx.geojson" });

    map.addLayer({
      id: "runs-outline",
      type: "line",
      source: "runs",
      filter: ["==", ["get","piste:type"], "downhill"],
      paint: {
        "line-color": "#ffffff",
        "line-width": 6,
        "line-opacity": 0.5
      }
    });

    map.addLayer({
      id: "runs-colored",
      type: "line",
      source: "runs",
      filter: ["==", ["get","piste:type"], "downhill"],
      paint: {
        "line-color": [
          "case",
          ["in", ["downcase", ["to-string", ["get","piste:difficulty"]]], ["literal", ["easy","novice","beginner","blue"]]], "#1f77b4",
          ["in", ["downcase", ["to-string", ["get","piste:difficulty"]]], ["literal", ["intermediate","medium","red"]]], "#d62728",
          ["in", ["downcase", ["to-string", ["get","piste:difficulty"]]], ["literal", ["advanced","expert","difficult","black"]]], "#000000",
          "#7aa6d8"
        ],
        "line-width": 4,
        "line-opacity": 0.95
      }
    });

    // 🎯 CLICK + POPUP
    map.on("click", "runs-colored", (e) => {
      const feature = e.features[0];
      const props = feature.properties;

      const nome = props.name || "Pista senza nome";
      const difficolta = props["piste:difficulty"] || "Non specificata";

      let colore = "#7aa6d8";
      if (difficolta.toLowerCase().includes("blue")) colore = "#1f77b4";
      if (difficolta.toLowerCase().includes("red")) colore = "#d62728";
      if (difficolta.toLowerCase().includes("black")) colore = "#000000";

      new maplibregl.Popup()
        .setLngLat(e.lngLat)
        .setHTML(`
          <div style="font-family:system-ui;min-width:180px;">
            <div style="font-weight:900;font-size:16px;margin-bottom:6px;">
              ${nome}
            </div>
            <div>
              🎿 Difficoltà:
              <span style="font-weight:800;color:${colore};">
                ${difficolta}
              </span>
            </div>
          </div>
        `)
        .addTo(map);
    });

    map.on("mouseenter", "runs-colored", () => {
      map.getCanvas().style.cursor = "pointer";
    });

    map.on("mouseleave", "runs-colored", () => {
      map.getCanvas().style.cursor = "";
    });

    setMsg("✅ 3D pronto. Clicca una pista per vedere le info.");
  });

  document.getElementById("ex").addEventListener("input", (e)=>{
    const ex = Number(e.target.value) / 100;
    map.setTerrain({ source: "terrainSource", exaggeration: ex });
  });
</script>
</body>
</html>
