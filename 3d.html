<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Sauze 3D</title>

  <link href="https://unpkg.com/maplibre-gl@2.4.0/dist/maplibre-gl.css" rel="stylesheet"/>

  <style>
    html,body{margin:0;height:100%}
    #map{height:100%; background:#0b1220;}
    .panel{
      position:absolute; left:12px; top:12px; z-index:10;
      background:rgba(255,255,255,0.95);
      padding:12px; border-radius:14px;
      box-shadow:0 8px 20px rgba(0,0,0,0.2);
      font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial;
      width:380px; max-width: calc(100% - 24px);
    }
    .row{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}
    button{border:0;border-radius:10px;padding:8px 10px;font-weight:900;cursor:pointer}
    .btn-dark{background:#111;color:#fff}
    .btn-light{background:#eee;color:#111}
    .small{font-size:12px;margin-top:8px;color:#333}
    input[type="range"]{width:100%}
    .msg{
      position:absolute; left:12px; right:12px; bottom:12px; z-index:20;
      background:rgba(0,0,0,0.78); color:#fff;
      padding:10px 12px; border-radius:14px;
      font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial;
      font-size:13px; line-height:1.3;
      white-space:pre-wrap;
    }
  </style>
</head>
<body>

<div id="map"></div>

<div class="panel">
  <div style="font-weight:1000;">🏔️ Sauze 3D</div>
  <div class="row">
    <button class="btn-dark" onclick="location.href='./'">↩︎ Torna 2D</button>
  </div>

  <div class="row">
    <button class="btn-light" id="btnMap">🗺️ Mappa</button>
    <button class="btn-dark" id="btnSat">🛰️ Satellite</button>
  </div>

  <div class="small">Esagerazione rilievo</div>
  <input id="ex" type="range" min="50" max="300" value="140">

  <div class="small">Tip: clicca una pista per info • 2 dita: inclina/ruota</div>
</div>

<div class="msg" id="msg">Avvio…</div>

<script src="https://unpkg.com/maplibre-gl@2.4.0/dist/maplibre-gl.js"></script>
<script>
  // 🔑 Incolla QUI la tua key MapTiler (quella che ti funzionava prima)
  const MAPTILER_KEY = "PASTE_YOUR_MAPTILER_KEY_HERE";

  const msg = document.getElementById("msg");
  const setMsg = (t)=> msg.textContent = t;

  function webglOk(){
    try{
      const c = document.createElement("canvas");
      const gl = c.getContext("webgl") || c.getContext("experimental-webgl");
      return !!gl;
    }catch(e){ return false; }
  }
  if(!webglOk()){
    setMsg("❌ WebGL non disponibile. Abilita accelerazione hardware o prova un altro browser.");
    throw new Error("WebGL not available");
  }

  const CENTER = [6.86, 45.03];
  const MAX_ZOOM_SAFE = 18;

  // ✅ Style “Mappa” (raster CARTO) – stabile
  const cartoStyle = {
    version: 8,
    sources: {
      carto: {
        type: "raster",
        tiles: ["https://basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}.png"],
        tileSize: 256,
        maxzoom: 19,
        attribution: "© OpenStreetMap contributors © CARTO"
      }
    },
    layers: [
      { id: "base", type: "raster", source: "carto" }
    ]
  };

  // ✅ Style MapTiler (satellite) – come prima
  const maptilerSatelliteStyleURL = `https://api.maptiler.com/maps/satellite/style.json?key=${MAPTILER_KEY}`;

  // DEM terrarium
  const TERRAIN_SOURCE_ID = "terrainSource";
  const TERRAIN_TILES = ["https://s3.amazonaws.com/elevation-tiles-prod/terrarium/{z}/{x}/{y}.png"];

  // GeoJSON piste
  const RUNS_SOURCE_ID = "runs";
  const RUNS_GEOJSON_URL = "./sauze_doulx.geojson";

  const map = new maplibregl.Map({
    container: "map",
    style: cartoStyle,
    center: CENTER,
    zoom: 12.2,
    pitch: 65,
    bearing: -20,
    antialias: true,
    maxZoom: MAX_ZOOM_SAFE
  });

  map.addControl(new maplibregl.NavigationControl({ visualizePitch: true }), "top-right");

  // -------------------------
  // Lunghezza pista: tag o calcolo
  // -------------------------
  function parseLengthToMeters(val){
    if(val === undefined || val === null) return null;

    if(typeof val === "number" && isFinite(val)){
      if(val <= 50) return val * 1000;  // probabile km
      return val;                       // probabile metri
    }
    const s = String(val).trim().toLowerCase();
    if(!s) return null;

    const m = s.match(/([0-9]+([.,][0-9]+)?)/);
    if(!m) return null;
    const num = Number(m[1].replace(",", "."));
    if(!isFinite(num)) return null;

    if(s.includes("km")) return num * 1000;
    if(s.includes("m")) return num;

    if(num <= 50) return num * 1000;
    return num;
  }

  function haversineMeters(lon1, lat1, lon2, lat2){
    const R = 6371000;
    const toRad = (d)=> d * Math.PI / 180;
    const dLat = toRad(lat2 - lat1);
    const dLon = toRad(lon2 - lon1);
    const a = Math.sin(dLat/2)**2 +
      Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) * Math.sin(dLon/2)**2;
    return 2 * R * Math.asin(Math.min(1, Math.sqrt(a)));
  }

  function lineCoordsLengthMeters(coords){
    let total = 0;
    for(let i=1;i<coords.length;i++){
      const [lon1, lat1] = coords[i-1];
      const [lon2, lat2] = coords[i];
      total += haversineMeters(lon1, lat1, lon2, lat2);
    }
    return total;
  }

  function geometryLengthMeters(geom){
    if(!geom) return null;
    if(geom.type === "LineString") return lineCoordsLengthMeters(geom.coordinates || []);
    if(geom.type === "MultiLineString"){
      let total = 0;
      for(const line of (geom.coordinates || [])) total += lineCoordsLengthMeters(line || []);
      return total;
    }
    return null;
  }

  function formatMeters(m){
    if(m === null || !isFinite(m)) return "—";
    if(m >= 1000) return `${(m/1000).toFixed(2)} km`;
    return `${Math.round(m)} m`;
  }

  // -------------------------
  // Popup click piste
  // -------------------------
  let runPopup = null;

  function pistaPopupHtml(feature){
    const props = feature?.properties || {};
    const name = (props.name || props.ref || "Pista");
    const diff = (props["piste:difficulty"] || "—");

    const fromTag =
      parseLengthToMeters(props["piste:length"]) ??
      parseLengthToMeters(props.length) ??
      null;

    const fromGeom = (fromTag === null) ? geometryLengthMeters(feature?.geometry) : null;
    const meters = (fromTag !== null) ? fromTag : fromGeom;

    return `
      <div style="font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial; min-width:220px">
        🎿 <b>${name}</b><br>
        ⚑ Difficoltà: <b>${diff}</b><br>
        📏 Lunghezza: <b>${formatMeters(meters)}</b>
      </div>
    `;
  }

  function showRunPopup(lngLat, feature){
    if(runPopup) runPopup.remove();
    runPopup = new maplibregl.Popup({ closeButton:true, closeOnClick:true })
      .setLngLat(lngLat)
      .setHTML(pistaPopupHtml(feature))
      .addTo(map);
  }

  function bindRunsInteraction(){
    const layerId = "runs-colored";
    if(!map.getLayer(layerId)) return;

    // evita duplicati dopo setStyle
    map.off("mouseenter", layerId, onEnterRuns);
    map.off("mouseleave", layerId, onLeaveRuns);
    map.off("click", layerId, onClickRuns);

    map.on("mouseenter", layerId, onEnterRuns);
    map.on("mouseleave", layerId, onLeaveRuns);
    map.on("click", layerId, onClickRuns);
  }

  function onEnterRuns(){ map.getCanvas().style.cursor = "pointer"; }
  function onLeaveRuns(){ map.getCanvas().style.cursor = ""; }
  function onClickRuns(e){
    const f = e.features && e.features[0];
    if(!f) return;
    showRunPopup(e.lngLat, f);
  }

  // -------------------------
  // Riaggiunge terrain + piste (dopo ogni cambio stile)
  // -------------------------
  const exSlider = document.getElementById("ex");
  function currentExaggeration(){ return Number(exSlider.value)/100; }

  async function ensureTerrainAndRuns(){
    // Terrain
    if(!map.getSource(TERRAIN_SOURCE_ID)){
      map.addSource(TERRAIN_SOURCE_ID, {
        type: "raster-dem",
        tiles: TERRAIN_TILES,
        tileSize: 256,
        encoding: "terrarium",
        maxzoom: 14
      });
    }
    try{
      map.setTerrain({ source: TERRAIN_SOURCE_ID, exaggeration: currentExaggeration() });
    }catch(e){}

    // Runs source
    if(!map.getSource(RUNS_SOURCE_ID)){
      map.addSource(RUNS_SOURCE_ID, { type:"geojson", data: RUNS_GEOJSON_URL });
    }

    // rimuovi layer se già presenti
    ["runs-outline","runs-colored"].forEach(id => {
      if(map.getLayer(id)) map.removeLayer(id);
    });

    // filtro robusto: mostra piste anche se manca piste:type
    const runsFilter = ["any",
      ["==", ["get","piste:type"], "downhill"],
      ["==", ["get","piste:type"], "alpine"],
      ["!has", "piste:type"]
    ];

    // outline
    map.addLayer({
      id: "runs-outline",
      type: "line",
      source: RUNS_SOURCE_ID,
      filter: runsFilter,
      paint: {
        "line-color": "#ffffff",
        "line-width": ["interpolate", ["linear"], ["zoom"], 10, 3.5, 12, 5.5, 14, 7.5, 16, 10.0],
        "line-opacity": 0.55
      }
    });

    // colorate
    map.addLayer({
      id: "runs-colored",
      type: "line",
      source: RUNS_SOURCE_ID,
      filter: runsFilter,
      paint: {
        "line-color": [
          "case",
          ["in", ["downcase", ["to-string", ["get","piste:difficulty"]]], ["literal", ["easy","novice","beginner","blue"]]], "#1f77b4",
          ["in", ["downcase", ["to-string", ["get","piste:difficulty"]]], ["literal", ["intermediate","medium","red"]]], "#d62728",
          ["in", ["downcase", ["to-string", ["get","piste:difficulty"]]], ["literal", ["advanced","expert","difficult","black"]]], "#000000",
          "#7aa6d8"
        ],
        "line-width": ["interpolate", ["linear"], ["zoom"], 10, 2.5, 12, 4.0, 14, 6.0, 16, 8.0],
        "line-opacity": 0.95
      }
    });

    // click handler
    bindRunsInteraction();
  }

  // ✅ QUESTA è la parte critica: aspettiamo style.load (non idle)
  function waitForStyleLoad(){
    return new Promise(resolve => {
      const done = () => resolve();
      map.once("style.load", done);
    });
  }

  async function setMapMode(){
    map.__mode = "map";
    setMsg("⏳ Carico Mappa…");
    map.setStyle(cartoStyle);
    await waitForStyleLoad();
    await ensureTerrainAndRuns();
    setMsg("✅ Modalità: Mappa 3D (clicca una pista)");
  }

  async function setSatelliteMode(){
    map.__mode = "satellite";
    setMsg("⏳ Carico Satellite…");
    map.setStyle(maptilerSatelliteStyleURL);
    await waitForStyleLoad();
    await ensureTerrainAndRuns();
    setMsg("✅ Modalità: Satellite 3D (clicca una pista)");
  }

  document.getElementById("btnMap").onclick = () => setMapMode();
  document.getElementById("btnSat").onclick = () => setSatelliteMode();

  exSlider.addEventListener("input", () => {
    try { map.setTerrain({ source: TERRAIN_SOURCE_ID, exaggeration: currentExaggeration() }); } catch(e){}
  });

  // error handling: ignora errori tile non fatali
  function shouldIgnoreErrorMessage(m){
    const s = String(m||"").toLowerCase();
    if (s.includes("failed to fetch")) return true;
    if (s.includes("404")) return true;
    if (s.includes("tile")) return true;
    return false;
  }
  let lastHardErrorAt = 0;
  map.on("error", (e) => {
    const em = (e && e.error && e.error.message) ? e.error.message : (e?.message || "");
    console.error("Map error:", e?.error || e);
    if (shouldIgnoreErrorMessage(em)) return;

    const now = Date.now();
    if(now - lastHardErrorAt < 3000) return;
    lastHardErrorAt = now;

    setMsg("❌ Errore mappa:\n" + em);
  });

  // avvio
  map.on("load", async () => {
    await ensureTerrainAndRuns();
    setMsg("✅ 3D pronto. Premi “Satellite” per la vista satellitare. Clicca una pista per info.");
  });
</script>
</body>
</html>
